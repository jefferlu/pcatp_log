name: Build Windows Executable

on:
  push:
    tags:
      - "v*"           # 推 tag（如 v1.0.0）時自動 build
  workflow_dispatch:   # 也可在 GitHub 網頁手動觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller ATPLogAnalyzer.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATPLogAnalyzer-Windows
          path: dist\ATPLogAnalyzer\
          retention-days: 30

      - name: Create ZIP for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist
          Compress-Archive -Path ATPLogAnalyzer -DestinationPath ATPLogAnalyzer-Windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\ATPLogAnalyzer-Windows.zip
          generate_release_notes: true
