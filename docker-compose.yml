services:
  pcatp-log:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pcatp-log
    ports:
      - "8501:8501"
    volumes:
      # DuckDB persistent storage
      - atp-data:/data
      # Config files (users.yaml, shares.yaml) — edit on host, reload in container
      - ./config:/app/config
    environment:
      - ATP_DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  atp-data:
    driver: local
